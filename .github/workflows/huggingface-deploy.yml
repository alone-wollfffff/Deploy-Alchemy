# ════════════════════════════════════════════════════════════════════
#  Auto-deploy to HuggingFace Spaces on every push to main
#  Every git push → this runs → HuggingFace rebuilds automatically
# ════════════════════════════════════════════════════════════════════

name: Deploy to HuggingFace Spaces

on:
  push:
    branches:
      - main          # triggers on every push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for HF sync
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git
          git config user.email "deploy-bot@github.com"
          git config user.name  "Deploy Bot"

          # Push this repo to your HuggingFace Space
          # Replace YOUR_HF_USERNAME and YOUR_SPACE_NAME below
          git push \
            https://lonewollff:${HF_TOKEN}@huggingface.co/spaces/lonewollff/Deploy_Alchemy \
            main:main \
            --force
