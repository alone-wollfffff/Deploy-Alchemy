name: Deploy to HuggingFace Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git
          git config user.email "deploy-bot@github.com"
          git config user.name  "Deploy Bot"

          # Set remote with token authentication
          git remote add space https://lonewollff:${HF_TOKEN}@huggingface.co/spaces/lonewollff/Deploy_Alchemy

          # Push to HuggingFace Space
          git push space main:main --force
